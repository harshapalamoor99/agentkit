name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (real-bug checks only)
        run: |
          pip install ruff
          # Only fail on genuine errors (syntax, undefined names), not style.
          ruff check --select E9,F63,F7,F82 src tests

      - name: Run test suite
        env:
          PYTHONPATH: src
        run: pytest -q

      - name: Eval harness smoke test
        env:
          PYTHONPATH: src
        run: |
          # Runs the full agent over the RAG eval set offline (mock LLM); asserts the
          # report is produced and RAG recall is scored. Proves the pipeline is runnable
          # end-to-end in CI without any provider key.
          python -m agentkit.evals.cli data/evals/rag_knowledge.jsonl
